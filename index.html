function qty(id,d){const i=cart.find(x=>x.id===id);if(!i)return;i.qty+=d;if(i.qty<=0)cart=cart.filter(x=>x.id!==id);renderCart()}function removeItem(id){cart=cart.filter(x=>x.id!==id);renderCart()}

function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function price(p){return Number(p.priceOneDay||p.priceTwoDays||0)}

function sectionOf(p){let c=p.category||''; if(c==='السناك والعربات')return 'snacks'; if(c==='تجهيز الحفلات والمناسبات')return 'events'; if(c==='بنود أخرى')return 'other'; return 'bouncies'}
function allLabel(sec){return 'الجميع'}
function isAllSub(sub){return String(sub||'')==='الجميع' || String(sub||'').startsWith('جميع')}
function matchesInternal(p,sub){const name=(p.name||''), c=(p.category||''), t=(p.type||''), d=(p.details||''); if(isAllSub(sub))return true;
 if(sub.includes('مائية'))return c.includes('مائية')||t.includes('مائية')||name.includes('مائية'); if(sub.includes('جافة'))return c.includes('الجافة')||t.includes('جافة'); if(sub.includes('زحاليق'))return c.includes('زحلاقيات')||name.includes('زحلاقية')||name.includes('زحلاقية'); if(sub.includes('صابونية')||sub.includes('فوم'))return c.includes('صابونية')||t.includes('صابوني')||name.includes('رغوة')||name.includes('فوم'); if(sub.includes('أحواض')||sub.includes('مسابح'))return t.includes('حوض')||name.includes('حوض')||name.includes('مسبح'); if(sub.includes('رغوة'))return t.includes('رغوة')||name.includes('رغوة');
 if(sub.includes('فشار'))return name.includes('فشار'); if(sub.includes('غزل'))return name.includes('غزل'); if(sub.includes('بطاط'))return name.includes('بطاط'); if(sub.includes('ذرة'))return name.includes('ذرة'); if(sub.includes('العصير والبراد'))return name.includes('عصير')||name.includes('براد'); if(sub.includes('السلاش'))return name.includes('سلاش'); if(sub.includes('ايسكريم')||sub.includes('الايسكريم'))return name.includes('ايس كريم')||name.includes('ايسكريم'); if(sub.includes('براد مع الايسكريم'))return name.includes('سلاش البراد')||name.includes('براد')||name.includes('ايس كريم')||name.includes('ايسكريم'); if(sub.includes('شوكولات'))return name.includes('شوك')||name.includes('شوكولات'); if(sub.includes('وافل'))return name.includes('وافل'); if(sub.includes('بانكيك'))return name.includes('بانكيك'); if(sub.includes('برجر'))return name.includes('برجر')||name.includes('نقتس')||name.includes('شيبس'); if(sub.includes('بدون عربة'))return name.includes('ماكينة')&&!name.includes('العربة')&&!name.includes('عربة');
 if(sub.includes('مربع'))return name.includes('مربع'); if(sub.includes('دائري مرفوع'))return name.includes('دائري مرفوع'); if(sub.includes('دائري أرضي')||sub.includes('دائري ارضي'))return name.includes('دائري ارضي')||name.includes('دائري أرضي'); if(sub.includes('بوابات'))return name.includes('بوابة'); if(sub.includes('بالونات'))return name.includes('بالون')||name.includes('استاند'); if(sub.includes('إضاءة')||sub.includes('اضاءة'))return name.includes('اضاءة')||name.includes('إضاءة')||name.includes('ليزر'); if(sub.includes('فقاعات')||sub.includes('دخان'))return name.includes('فقاعات')||name.includes('دخان'); if(sub.includes('ميلاد')||sub.includes('تخرج')||sub.includes('مدارس')||sub.includes('روضات')||sub.includes('فنادق')||sub.includes('شركات')||sub.includes('خطوبة')||sub.includes('زواج'))return sectionOf(p)==='events';
 if(sub.includes('أجهزة'))return name.includes('جهاز')||name.includes('ماكينة'); if(sub.includes('شخصيات'))return name.includes('شخصية')||name.includes('كرتونية'); if(sub.includes('ستيج'))return name.includes('ستيج'); return true;}
function desc(p){let s=sectionOf(p); if(s==='snacks')return 'خدمة سناك للحفلات مع تجهيز مرتب وتشغيل حسب الباقة وعدد الأطفال.'; if(s==='events')return 'تجهيز حفلات ومناسبات بديكور مرتب وخيارات حسب الطلب.'; if(s==='other')return 'خدمة إضافية يمكن إضافتها مع الحجز حسب المناسبة.'; if((p.type||'').includes('مائية')||(p.category||'').includes('مائية'))return 'لعبة مائية ممتعة للأطفال مع تركيب من فريق الملكة.'; if((p.type||'').includes('صابوني'))return 'فعالية صابونية مرحة مناسبة للحفلات والتجمعات.'; return 'نطاطية أو زحلاقية مناسبة لحفلات الأطفال داخل قطر.'}

function relevantProducts(){let arr=products.filter(p=>current==='home'||current==='offers'?true:sectionOf(p)===current); if(current==='offers'){arr=products.filter(p=>['bouncies','snacks','events'].includes(sectionOf(p))).slice(0,36)} arr=arr.filter(p=>matchesInternal(p,internal)); const term=q.value.trim().toLowerCase(); if(term)arr=arr.filter(p=>`${p.number} ${p.name} ${p.category} ${p.type} ${p.age} ${p.details||''}`.toLowerCase().includes(term)); const sort=sortSelect.value; arr.sort((a,b)=>sort==='priceAsc'?price(a)-price(b):sort==='priceDesc'?price(b)-price(a):Number(a.number)-Number(b.number)); return arr}
function renderHome(){const counts={bouncies:products.filter(p=>sectionOf(p)==='bouncies').length,snacks:products.filter(p=>sectionOf(p)==='snacks').length,events:products.filter(p=>sectionOf(p)==='events').length,other:products.filter(p=>sectionOf(p)==='other').length}; app.innerHTML=`<section class="hero"><span class="kicker">👑 كتالوج الحجز السريع</span><h1>اختار المنتج من الصور والأقسام… وارسله واتساب مباشرة</h1><p>هذه نسخة كتالوج مبنية على قاعدة بيانات المنتجات، مع المحافظة على الأقسام وطريقة العرض السريعة: بحث، فلترة، تفاصيل، وحجز واتساب.</p><div class="heroActions"><button class="btn red" onclick="showSection('bouncies')">النطاطيات والزحلاقيات</button><button class="btn" onclick="showSection('snacks')">السناك والعربات</button><button class="btn" onclick="showSection('events')">تجهيز الحفلات</button><button class="btn green" onclick="generalWa()">حجز واتساب</button></div></section><section class="wrap section"><div class="title"><div><h2>الأقسام الرئيسية</h2><p>نفس التقسيم الأساسي للكتالوج مع عرض مرتب حسب كل قسم.</p></div><div class="stats"><span class="stat">الإجمالي: ${products.length}</span></div></div><div class="mainCats">${sections.filter(s=>s[0]!=='home').map(s=>`<button class="cat" onclick="showSection('${s[0]}')"><div class="icon">${s[2]}</div><h3>${s[1]}</h3><p>${s[0]==='bouncies'?counts.bouncies:s[0]==='snacks'?counts.snacks:s[0]==='events'?counts.events:s[0]==='other'?counts.other:'مختارات'} بند</p></button>`).join('')}</div></section><section class="wrap section"><div class="title"><div><h2>مختارات سريعة</h2><p>نماذج من المنتجات للمعاينة.</p></div></div><div class="products">${products.slice(0,8).map(card).join('')}</div></section>`}
function render(){if(current==='home'){renderHome();return} renderNav(); fillInternal(); const arr=relevantProducts(); const name=(sections.find(s=>s[0]===current)||[])[1]||'الكتالوج'; app.innerHTML=`<section class="wrap section"><div class="panel"><div><h1>${icon(current)} ${name}</h1><p>عدد البنود المعروضة: ${arr.length} — اضغط على الصورة أو التفاصيل لفتح بيانات المنتج.</p></div><button class="btn green" onclick="generalWa()">واتساب عام</button></div><div class="chips">${(internalSections[current]||['الجميع']).map(x=>`<button class="chip ${x===internal?'active':''}" onclick="setInternal('${esc(x)}')">${x}</button>`).join('')}</div><div class="products">${arr.length?arr.map(card).join(''):'<div class="empty">لا توجد منتجات مطابقة للبحث أو الفلتر الحالي</div>'}</div></section>`}
function card(p){const inCart=cart.some(x=>Number(x.number)===Number(p.number));return `<div class="product"><div class="num">#${p.number}</div><div class="body"><h3>${esc(p.name)}</h3><p class="desc">${esc(desc(p))}</p><div class="tags"><span class="tag">${esc(p.category)}</span><span class="tag">${esc(p.type||'حسب الطلب')}</span><span class="tag">${esc(duration(p))}</span></div><div class="bottom"><div class="actions"><button class="details" onclick="openProduct(${p.number})">التفاصيل</button><button class="addCart" onclick="addToCart(${p.number})">${inCart?'مضاف ✓':'أضف للسلة'}</button><button class="wa" onclick="quickWa(${p.number})">واتساب</button></div><div class="price"><small>يبدأ من</small><strong>${price(p)} ر.ق</strong></div></div></div><div class="pic" onclick="openProduct(${p.number})"><img src="${esc(p.image)}" alt="${esc(p.name)}" onerror="this.src='${p.number}.jpg';this.onerror=null"></div></div>`}
function saveCart(){localStorage.setItem('almalikaCart',JSON.stringify(cart)); updateCartUI();}
function updateCartUI(){const count=cart.reduce((a,x)=>a+(x.qty||1),0); const total=cart.reduce((a,x)=>a+price(x)*(x.qty||1),0); const c=document.getElementById('cartCount'), ct=document.getElementById('cartCountTop'), tm=document.getElementById('cartTotalMini'); if(c)c.textContent=count; if(ct)ct.textContent=count; if(tm)tm.textContent=total;}
function addToCart(n){const p=products.find(x=>Number(x.number)===Number(n)); if(!p)return; const old=cart.find(x=>Number(x.number)===Number(n)); if(old){old.qty=(old.qty||1)+1}else{cart.push({...p,qty:1})} saveCart(); render();}
function changeQty(n,delta){const item=cart.find(x=>Number(x.number)===Number(n)); if(!item)return; item.qty=(item.qty||1)+delta; if(item.qty<=0)cart=cart.filter(x=>Number(x.number)!==Number(n)); saveCart(); openCart();}
function removeFromCart(n){cart=cart.filter(x=>Number(x.number)!==Number(n)); saveCart(); openCart();}
function clearCart(){cart=[]; saveCart(); openCart();}
function cartTotal(){return cart.reduce((a,x)=>a+price(x)*(x.qty||1),0)}
function cartMessage(){const name=document.getElementById('custName')?.value||''; const phone=document.getElementById('custPhone')?.value||''; const area=document.getElementById('custArea')?.value||''; const date=document.getElementById('custDate')?.value||''; const note=document.getElementById('custNote')?.value||''; const list=cart.map((p,i)=>`${i+1}) #${p.number} - ${p.name}\nالكمية: ${p.qty||1}\nالسعر: ${price(p)} ر.ق`).join('\n\n'); return `السلام عليكم، أريد حجز البنود التالية من كتالوج الملكة:\n\n${list}\n\nالإجمالي التقريبي: ${cartTotal()} ر.ق\n\nبيانات العميل:\nالاسم: ${name}\nالجوال: ${phone}\nالمنطقة: ${area}\nتاريخ الحجز: ${date}\nملاحظات: ${note}`}
function sendCartWa(){if(!cart.length){alert('السلة فارغة');return} window.open('https://wa.me/97433317720?text='+encodeURIComponent(cartMessage()),'_blank')}
function openCart(){modal.innerHTML=`<div class="modalBox" style="grid-template-columns:1fr"><div class="modalInfo"><div class="modalHead"><h2>🛒 سلة الحجز</h2><button class="close" onclick="closeModal()">×</button></div>${cart.length?`<div class="cartList">${cart.map(p=>`<div class="cartItem"><img src="${esc(p.image)}" onerror="this.src='${p.number}.jpg';this.onerror=null"><div><h3>#${p.number} - ${esc(p.name)}</h3><p>${esc(p.category)} — ${price(p)} ر.ق × ${p.qty||1}</p></div><div class="qtyBox"><button onclick="changeQty(${p.number},1)">+</button><b>${p.qty||1}</b><button onclick="changeQty(${p.number},-1)">−</button><button class="removeBtn" onclick="removeFromCart(${p.number})">×</button></div></div>`).join('')}</div><div class="cartTotal">الإجمالي التقريبي: ${cartTotal()} ر.ق</div><div class="cartForm"><input id="custName" placeholder="اسم العميل"><input id="custPhone" placeholder="رقم الجوال"><input id="custArea" placeholder="المنطقة / رابط الموقع"><input id="custDate" placeholder="تاريخ الحجز"><textarea id="custNote" placeholder="ملاحظات إضافية"></textarea></div><div class="modalActions three"><button onclick="sendCartWa()" style="background:var(--green);color:#fff">إرسال السلة واتساب</button><button onclick="clearCart()">تفريغ السلة</button><button onclick="closeModal()">متابعة التسوق</button></div>`:'<div class="empty">السلة فارغة — اضغط “أضف للسلة” من أي منتج ليظهر هنا.</div><div class="modalActions"><button onclick="closeModal()">متابعة التسوق</button><button onclick="generalWa()" style="background:var(--green);color:#fff">استفسار واتساب</button></div>'}</div></div>`; modal.classList.add('show')}
function productMsg(p){return `السلام عليكم، أريد حجز / الاستفسار عن:
#${p.number} - ${p.name}
القسم: ${p.category}
السعر: ${price(p)} ر.ق
المدة: ${duration(p)}`}
function quickWa(n){const p=products.find(x=>Number(x.number)===Number(n)); if(!p)return; window.open('https://wa.me/97433317720?text='+encodeURIComponent(productMsg(p)),'_blank')}
function generalWa(){window.open('https://wa.me/97433317720?text='+encodeURIComponent('السلام عليكم، أريد الاستفسار عن كتالوج شركة الملكة للحفلات.'),'_blank')}
function openProduct(n){const p=products.find(x=>Number(x.number)===Number(n)); if(!p)return; modal.innerHTML=`<div class="modalBox"><div class="modalPic"><img src="${esc(p.image)}" onerror="this.src='${p.number}.jpg';this.onerror=null"></div><div class="modalInfo"><div class="modalHead"><h2>${esc(p.name)}</h2><button class="close" onclick="closeModal()">×</button></div><div class="tags" style="margin-top:10px"><span class="tag">#${p.number}</span><span class="tag">${esc(p.category)}</span><span class="tag">${esc(p.type||'حسب الطلب')}</span></div><div class="infoGrid"><div class="info">💰 السعر يوم واحد<br><b>${p.priceOneDay||'-'} ر.ق</b></div><div class="info">🎁 السعر يومين<br><b>${p.priceTwoDays||'-'} ر.ق</b></div><div class="info">⏱️ المدة<br><b>${esc(duration(p))}</b></div><div class="info">👶 الفئة / العدد<br><b>${esc(p.age||'حسب الطلب')}</b></div><div class="info">📏 الطول<br><b>${esc(p.length||'-')}</b></div><div class="info">📐 العرض / الارتفاع<br><b>${esc((p.width||'-')+' / '+(p.height||'-'))}</b></div></div><div class="note">${esc(p.details||desc(p))}</div><div class="modalActions three"><a href="https://wa.me/97433317720?text=${encodeURIComponent(productMsg(p))}" target="_blank">إرسال واتساب</a><button onclick="addToCart(${p.number});closeModal()">أضف للسلة</button><button onclick="closeModal()">إغلاق</button></div></div></div>`; modal.classList.add('show')}
function closeModal(){modal.classList.remove('show')}modal.addEventListener('click',e=>{if(e.target===modal)closeModal()})
function setHash(){history.replaceState(null,'',`#${current}/${encodeURIComponent(internal)}`)}
function initFromHash(){const h=(location.hash||'').replace('#',''); const [sec,sub]=h.split('/'); current=sections.some(s=>s[0]===sec)?sec:'home'; internal=decodeURIComponent(sub||allLabel(current)); renderNav(); if(current==='home')showHome(); else{fillInternal(); render();}}
initFromHash();
updateCartUI();
</script>
</body>
</html>

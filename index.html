<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كتالوج النطاطيات | شركة الملكة للحفلات</title>
  
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

body{
font-family:'Cairo',sans-serif;
background:#fff8fc;
}

.topDecor{
position:fixed;
top:-200px;
left:-100px;
width:500px;
height:500px;
background:radial-gradient(circle,#ffd8ef,#ffffff00);
z-index:-1;
}

.mainHeader{
position:sticky;
top:0;
z-index:999;

display:flex;
justify-content:space-between;
align-items:center;
gap:20px;

padding:18px 40px;

background:rgba(255,255,255,.82);
backdrop-filter:blur(18px);

border-bottom:1px solid #ffe2ef;

box-shadow:
0 8px 30px rgba(255,105,180,.08);
}

.logoArea{
display:flex;
align-items:center;
gap:15px;
}

.logoCircle{
width:65px;
height:65px;
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:30px;

background:
linear-gradient(135deg,#ffd700,#fff0a0);

box-shadow:
0 8px 25px rgba(255,215,0,.3);
}

.logoArea h1{
margin:0;
font-size:28px;
color:#7b1238;
font-weight:900;
}

.logoArea p{
margin:0;
color:#9c6782;
font-size:14px;
}

.navMenu{
display:flex;
gap:25px;
}

.navMenu a{
text-decoration:none;
font-weight:700;
color:#7b1238;
transition:.3s;
}

.navMenu a:hover{
color:#ff4fa3;
transform:translateY(-2px);
}

.headerBtns{
display:flex;
gap:12px;
}

.goldBtn{
border:none;
padding:12px 22px;
border-radius:14px;

background:
linear-gradient(90deg,#ffd700,#fff0a0);

font-weight:900;
cursor:pointer;
}

.greenBtn{
border:none;
padding:12px 22px;
border-radius:14px;

background:#25D366;
color:white;

font-weight:900;
cursor:pointer;
}

@media(max-width:900px){

.mainHeader{
flex-direction:column;
padding:20px;
}

.navMenu{
flex-wrap:wrap;
justify-content:center;
}

}
:root{--m:#6A1B2E;--g:#D4AF37;--green:#25D366;--bg:#f7f2ea;--soft:#f4f4f4;--line:#e7dac8;--dark:#111}

  .hero{
background:linear-gradient(135deg,#ffb6d9,#ffd6f6,#fff0b3);
border-radius:40px;
padding:60px 30px;
text-align:center;
margin:30px auto;
box-shadow:0 10px 40px rgba(255,182,217,.35);
position:relative;
overflow:hidden;
}

.hero:before{
content:'';
position:absolute;
width:300px;
height:300px;
background:radial-gradient(circle,#ffffff99,#ffffff00);
top:-100px;
right:-100px;
}

.hero h2{
font-size:58px;
color:#7a1246;
margin-bottom:15px;
font-weight:900;
text-shadow:0 2px 10px #fff;
}

.hero p{
font-size:22px;
color:#8b4a63;
margin-bottom:30px;
font-weight:700;
}

.heroBtns{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.heroBtns button{
border:none;
padding:16px 28px;
border-radius:18px;
font-size:18px;
font-weight:800;
cursor:pointer;
transition:.3s;
}

.goldBtn{
background:linear-gradient(135deg,#ffe27a,#ffbf00);
color:#6b2d00;
box-shadow:0 5px 20px rgba(255,191,0,.4);
}

.greenBtn{
background:linear-gradient(135deg,#43e97b,#38f9d7);
color:white;
box-shadow:0 5px 20px rgba(67,233,123,.4);
}

.heroBtns button:hover{
transform:translateY(-4px) scale(1.03);
}

.categoryCard{
background:white;
border-radius:35px;
padding:35px 20px;
text-align:center;
box-shadow:0 10px 35px rgba(255,182,217,.18);
transition:.35s;
border:3px solid #fff4fb;
}

.categoryCard:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(255,182,217,.35);
}

.categoryCard h3{
font-size:28px;
color:#7a1246;
margin-top:15px;
}

.categoryCard span{
display:inline-block;
margin-top:10px;
background:#fff0f7;
padding:8px 18px;
border-radius:20px;
font-weight:800;
color:#d64f8c;
}

.product{
background:white;
border-radius:30px;
overflow:hidden;
box-shadow:0 10px 35px rgba(0,0,0,.08);
transition:.35s;
border:2px solid #fff1f6;
}

.product:hover{
transform:translateY(-10px);
}

.product img{
height:240px;
object-fit:cover;
}

.product .body{
padding:20px;
}

.product h3{
font-size:24px;
color:#7a1246;
margin-bottom:10px;
}

.product .price{
font-size:26px;
font-weight:900;
color:#ff3b7f;
}

.addBtn{
width:100%;
border:none;
padding:16px;
border-radius:18px;
background:linear-gradient(135deg,#ff6cab,#ff9a8b);
color:white;
font-size:18px;
font-weight:900;
cursor:pointer;
margin-top:15px;
}

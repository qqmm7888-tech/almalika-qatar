<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>الملكة - تطبيق الحجز</title>
<style>
:root{--q:#6f1738;--q2:#8f2450;--p:#ff2f86;--g:#18c964;--bg:#f6f6f6;--line:#e8e8e8;--muted:#777}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Tahoma,Arial,sans-serif;color:#171717;padding-bottom:82px}button,input,select{font-family:inherit}button{border:0;cursor:pointer}.wrap{width:min(100% - 24px,1500px);margin:auto}
.top{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);z-index:100}.head{height:68px;display:grid;grid-template-columns:180px 1fr auto;gap:14px;align-items:center}.logo{display:flex;align-items:center;gap:8px;font-size:31px;font-weight:900;color:var(--q)}.logo span{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;background:#fff4c7}
.search{height:44px;background:#f4f4f4;border:1px solid var(--line);border-radius:11px;display:flex;align-items:center;gap:9px;padding:0 13px}.search input{width:100%;border:0;outline:0;background:transparent;font-weight:800}.actions{display:flex;gap:8px}.actions button,.nav button{border-radius:999px;background:#f2f2f2;padding:10px 15px;font-weight:900;white-space:nowrap}.actions .cart{background:#e60023;color:#fff}
.nav{display:flex;gap:9px;overflow:auto;padding:0 0 10px}.nav button{background:#fff;border:1px solid var(--line)}.nav .active{background:var(--q);color:#fff}.back{display:none;background:#111!important;color:#fff!important}
.heroBox{background:#fff;border-bottom:1px solid var(--line)}.hero{display:grid;grid-template-columns:250px 1fr;gap:14px;padding:15px 0}.side{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 8px 24px #0001}.side h3{margin:0;padding:14px;background:#fafafa}.side button{width:100%;padding:13px;background:#fff;border-top:1px solid var(--line);font-weight:900;text-align:right}
.banner{min-height:285px;border-radius:18px;overflow:hidden;position:relative;background:#ffeefa;box-shadow:0 8px 24px #0001}.banner:before{content:"";position:absolute;inset:0;background:url('home_banner.jpg?v=1779778153') center/cover no-repeat,linear-gradient(135deg,#ffeefa,#fff7dc)}.banner:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#fff5,#fff9 45%,#fff5)}.bannerText{position:relative;z-index:2;text-align:center;padding:52px 20px}.bannerText h1{font-size:72px;line-height:1;margin:0;color:#9c5b15;text-shadow:0 2px 0 #fff}.bannerText h2{margin:12px 0 0;color:var(--q);font-size:34px}.bannerText p{font-weight:900;color:#8a5b16;font-size:20px}.btn{border-radius:999px;padding:12px 21px;font-weight:900}.primary{background:var(--q);color:#fff}.dark{background:#111;color:#fff}.light{background:#fff;border:1px solid var(--line);color:var(--q)}
.cats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px auto}.cat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px;display:flex;gap:12px;align-items:center;box-shadow:0 8px 24px #0001;cursor:pointer}.ico{width:54px;height:54px;border-radius:15px;background:#fff1f7;display:grid;place-items:center;font-size:28px}.cat b{display:block;color:var(--q);font-size:18px}.cat small{color:var(--muted);font-weight:800}
.title{background:#fff;border:1px solid var(--line);border-radius:18px;margin:18px 0;padding:18px}.title h1{margin:0;color:var(--q);font-size:36px}.title p{font-weight:800;color:var(--muted)}.filters{display:flex;gap:8px;overflow:auto;margin:12px 0 18px}.filters button{background:#fff;border:1px solid var(--line);border-radius:99px;padding:10px 15px;font-weight:900}.filters .active{background:var(--q);color:#fff}
.sec{display:flex;justify-content:space-between;align-items:end;margin:28px 0 14px}.sec h2{margin:0;color:var(--q);font-size:34px}.sec p{margin:5px 0 0;color:var(--muted);font-weight:800}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;box-shadow:0 7px 20px #0001;position:relative}.num{position:absolute;top:10px;left:10px;background:var(--p);color:#fff;border-radius:99px;padding:5px 9px;font-size:12px;font-weight:900;z-index:2}.pic{height:185px;background:#fafafa;border-bottom:1px solid var(--line);display:grid;place-items:center;overflow:hidden}.pic img{width:100%;height:100%;object-fit:contain;display:block;padding:8px}.body{padding:12px}.body h3{margin:0;font-size:17px;line-height:1.35;min-height:46px}.body p{font-size:12px;color:var(--muted);font-weight:700;line-height:1.5;min-height:34px}.tag{display:inline-block;background:#fff6e6;border:1px solid #ead7aa;color:#805514;border-radius:99px;padding:5px 8px;font-size:11px;font-weight:900;margin:2px}.price{font-size:20px;font-weight:900}.price small{font-size:11px;color:#9b6b1f}.cardBtns{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}.cardBtns button{border-radius:10px;padding:10px;font-weight:900}.book{background:var(--p);color:#fff}.wa{background:var(--g);color:#fff}
.float{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:#111;color:#fff;border-radius:99px;padding:14px 34px;font-weight:900;min-width:330px;text-align:center;z-index:80}.modal{display:none;position:fixed;inset:0;background:#0008;z-index:200;place-items:center;padding:15px}.modal.show{display:grid}.box{width:min(680px,100%);background:#fff;border-radius:18px;overflow:hidden}.mh{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line);padding:16px}.mh h3{margin:0;color:var(--q);font-size:25px}.mh button{width:38px;height:38px;border-radius:50%;font-size:22px}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}.field label{font-weight:900;color:var(--q)}.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:10px;padding:12px;outline:0}.field textarea{min-height:85px}.foot{margin-top:35px;background:#fff;border-top:1px solid var(--line);padding:28px;text-align:center;font-weight:900;color:var(--q)}
@media(max-width:1200px){.grid{grid-template-columns:repeat(4,1fr)}.hero{grid-template-columns:1fr}.side{display:none}}@media(max-width:850px){.head{height:auto;grid-template-columns:1fr auto;padding:10px 0}.search{grid-column:1/-1}.actions button:not(.cart){display:none}.grid{grid-template-columns:repeat(2,1fr)}.cats{grid-template-columns:repeat(2,1fr)}.bannerText h1{font-size:52px}.bannerText h2{font-size:24px}}@media(max-width:520px){.grid,.cats{grid-template-columns:1fr}.form{grid-template-columns:1fr}.float{width:calc(100% - 24px);min-width:0}.pic{height:220px}}
</style>
</head>
<body>
<header class="top"><div class="wrap head"><div class="logo" onclick="go('home')"><span>👑</span>الملكة</div><div class="search"><b onclick="searchNow()">🔍</b><input id="q" placeholder="ابحث برقم اللعبة أو الاسم أو القسم"></div><div class="actions"><button class="cart" onclick="openCart()">🛒 <span id="cartN">0</span></button><button onclick="wa()">واتساب</button><button>بيانات الزبون</button></div></div><div class="wrap nav" id="nav"></div></header>
<main id="app"></main><div class="float" onclick="openCart()">🛒 سلتي | <span id="total">0</span> ر.ق</div>
<div id="modal" class="modal"><div class="box"><div class="mh"><h3 id="mt">طلب حجز</h3><button onclick="hide()">×</button></div><div class="form"><div class="field"><label>اسم العميل</label><input id="name"></div><div class="field"><label>رقم الجوال</label><input id="phone"></div><div class="field"><label>التاريخ</label><input id="date" type="date"></div><div class="field"><label>الوقت</label><select id="time"><option>الصباح</option><option>العصر</option><option>المساء</option></select></div><div class="field"><label>نوع الحجز</label><select id="type"></select></div><div class="field"><label>المدة</label><select id="dur"></select></div><div class="field full"><label>الموقع</label><input id="loc"></div><div class="field full"><label>ملاحظات</label><textarea id="notes"></textarea></div><div class="field full"><button class="btn primary" onclick="send()">إرسال واتساب</button></div></div></div></div>
<script>
const REPO_RAW="https://raw.githubusercontent.com/qqmm7888-tech/almalika-qatar/main/", IMG_VERSION="1779778153";
const navs=[["home","الرئيسية"],["bouncies","النطاطيات"],["offers","العروض والبكجات"],["snacks","السناك والعربات"],["events","تجهيز الحفلات"],["terms","شروط الحجز"],["contact","تواصل معنا"]];
const items=[]; let picked=null;
function add(o){items.push(o)}
for(let i=1;i<=85;i++){let cat=i<=25?"النطاطيات الجافة":i<=60?"النطاطيات المائية":i<=75?"الزحاليق":"الملاعب الصابونية";add({n:i,t:(cat.includes("مائية")||cat.includes("زحاليق")?"زحليقة ":"نطاطية ")+i,s:"bouncies",cat:cat,price:i<=25?500:600,dur:"يوم كامل",d:"خدمة تركيب وتجهيز آمن لحفلات الأطفال والمناسبات."})}
[[86,"ماكينة الفشار",400],[87,"ماكينة الفشار + العربة",500],[88,"ماكينة غزل البنات",400],[89,"ماكينة غزل البنات + العربة",500],[90,"ماكينة البطاطس الحلزونية",550],[91,"ماكينة البطاطس الحلزونية + عربة",650],[92,"ماكينة الذرة الحلوة + طاولة",500],[93,"ماكينة البراد + طاولة",500],[95,"ماكينة العصير البارد + عربة",600],[96,"نافورة الشوكولاتة",800],[97,"ماكينة الآيسكريم",700],[99,"عربة الوافل",650],[100,"عربة البانكيك",650],[120,"عربة الفشار VIP",600],[121,"عربة غزل البنات VIP",600],[122,"عربة الذرة الحلوة VIP",600],[123,"عربة البطاطا الحلزونية VIP",600],[124,"عربة الآيسكريم VIP",700],[125,"عربة السلاش VIP",600],[126,"عربة البراد مع الآيسكريم",800],[127,"عربة البانكيك VIP",650],[128,"عربة نافورة الشوكولاتة VIP",800]].forEach(x=>add({n:x[0],t:x[1],s:"snacks",cat:"السناك والعربات",price:x[2],dur:"3 ساعات",d:"خدمة سناك للحفلات مع تشغيل وتجهيز مرتب."}));
[[101,"حفلات أعياد الميلاد",900],[102,"حفلات التخرج",1200],[103,"حفلات وردية",1000],[104,"حفلات أطفال ملونة",1000],[105,"ديكور عيد ميلاد",950],[106,"ديكور حفلة",950],[107,"ستاند حفلات",750],[108,"حفلات الخطوبة",1400],[109,"ديكور بالونات",650],[110,"حفلات المدارس والروضات",1500],[111,"ستاندات بالونات",450],[112,"إضاءات ليزر",350],[113,"جهاز فقاعات",300],[114,"جهاز فوم",500],[117,"أرضية LED",1200]].forEach(x=>add({n:x[0],t:x[1],s:"events",cat:"تجهيز الحفلات",price:x[2],dur:"حسب التجهيز",d:"تنسيق وتجهيز مناسبات بلمسات راقية."}));
[[201,"عرض نطاطية + سناك",999,34],[202,"عرض حفلة 20 طفل",1999,101],[203,"عرض ملعب صابوني وفوم",700,68],[204,"عرض عربات السناك",1480,126]].forEach(x=>add({n:x[0],imgn:x[3],t:x[1],s:"offers",cat:"العروض والبكجات",price:x[2],dur:"عرض",d:"باقة جاهزة للحجز بسعر خاص."}));
nav.innerHTML='<button class="back" id="backBtn" onclick="backGo()">رجوع</button>'+navs.map(x=>`<button id="n_${x[0]}" onclick="go('${x[0]}')">${x[1]}</button>`).join("");
function routeFromLocation(){let h=location.hash.replace("#",""); if(h) return h; let p=location.pathname.replace(/^\//,"").trim(); return p||"home"}
window.addEventListener("popstate",()=>render(routeFromLocation())); window.addEventListener("hashchange",()=>render(routeFromLocation()));
render(routeFromLocation());
q.addEventListener("keydown",e=>{if(e.key==="Enter")searchNow()});
function go(p){history.pushState({}, "", "/"+p); render(p)}
function backGo(){if(history.length>1) history.back(); else go("home")}
function active(p){document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));let n=document.getElementById("n_"+p);if(n)n.classList.add("active");backBtn.style.display=p==="home"?"none":"inline-block"}
function render(p){active(p); if(p==="home")home(); else if(p==="terms")terms(); else if(p==="contact")contact(); else if(["bouncies","snacks","events","offers"].includes(p)) catalog(p); else home()}
function fileName(x){let n=String(x.imgn||x.n); const sp={"107":"107(1).jpg","112":"112(1).jpg","117":"117-118-119.jpg","118":"117-118-119.jpg","119":"117-118-119.jpg"}; return sp[n]||n+".jpg"}
function imageUrl(x){return REPO_RAW+encodeURIComponent(fileName(x))+"?v="+IMG_VERSION}
function imgTag(x){return `<img src="${imageUrl(x)}" alt="${x.t}" loading="lazy" onerror="this.onerror=null;this.parentElement.innerHTML='<div style=&quot;font-size:42px&quot;>👑</div><b style=&quot;color:#6f1738&quot;>الصورة غير موجودة</b>'">`}
function home(){let list=[34,47,48,53,68,86,95,101,120,126].map(find).filter(Boolean);app.innerHTML=`<section class="heroBox"><div class="wrap hero"><aside class="side"><h3>فئات الملكة</h3><button onclick="go('bouncies')">النطاطيات والزحاليق 🏰</button><button onclick="go('snacks')">السناك والعربات 🍿</button><button onclick="go('events')">تجهيز الحفلات 🎀</button><button onclick="go('offers')">العروض والبكجات 🎁</button></aside><div class="banner"><div class="bannerText"><h1>الملكة</h1><h2>لتأجير النطاطيات والسناك وتجهيز الحفلات</h2><p>نصنع الفرح ونرتب أجمل المناسبات للأطفال والعائلات</p><button class="btn primary" onclick="go('bouncies')">شوف الألعاب</button> <button class="btn dark" onclick="go('snacks')">السناك</button> <button class="btn light" onclick="wa()">احجز واتساب</button></div></div></div></section><section class="wrap"><div class="cats">${cat("🏰","النطاطيات","مائية وجافة","bouncies")}${cat("🍿","السناك","عربات وماكينات","snacks")}${cat("🎀","الحفلات","ديكور وبالونات","events")}${cat("🎁","العروض","بكجات جاهزة","offers")}</div><div class="sec"><div><h2>اختيارات لك ✨</h2><p>مختارات من كل أقسام الملكة</p></div><button class="btn light" onclick="go('bouncies')">عرض الكتالوج</button></div><div class="grid">${list.map(card).join("")}</div></section>`}
function cat(i,t,s,p){return `<div class="cat" onclick="go('${p}')"><div class="ico">${i}</div><div><b>${t}</b><small>${s}</small></div></div>`}
function catalog(p){let names={bouncies:"النطاطيات والزحاليق",snacks:"السناك والعربات",events:"تجهيز الحفلات",offers:"العروض والبكجات"};let list=items.filter(x=>x.s===p);app.innerHTML=`<section class="wrap"><div class="title"><h1>${names[p]}</h1><p>اختار المنتج واضغط احجزها أو واتساب</p></div><div class="filters"><button class="active">الكل</button><button onclick="sortByNum()">ترتيب حسب الرقم</button><button>الأحدث</button></div><div class="grid" id="grid">${list.map(card).join("")}</div></section>`}
function card(x){return `<div class="card"><span class="num">#${x.n}</span><div class="pic">${imgTag(x)}</div><div class="body"><h3>${x.t}</h3><p>${x.d}</p><span class="tag">${x.cat}</span><span class="tag">${x.dur}</span><div class="price"><small>يبدأ من</small> ${x.price} ر.ق</div><div class="cardBtns"><button class="book" onclick="book('${x.n}')">احجزها</button><button class="wa" onclick="waItem('${x.n}')">واتساب</button></div></div></div>`}
function terms(){app.innerHTML='<section class="wrap"><div class="title"><h1>شروط الحجز</h1><p>الحجز بعد تأكيد التاريخ والموقع. توفير كهرباء ومساحة مناسبة. مدة السناك حسب الباقة. الأسعار حسب المنطقة والطلب.</p></div></section>'}
function contact(){app.innerHTML='<section class="wrap"><div class="title"><h1>تواصل معنا</h1><p>33317720 - 33317721 - 33317716 - 33317705<br>@almalika_qtr</p><button class="btn primary" onclick="wa()">فتح واتساب</button></div></section>'}
function searchNow(){let term=q.value.trim().toLowerCase(); if(!term)return; let list=items.filter(x=>(x.n+" "+x.t+" "+x.cat).toLowerCase().includes(term));active("");backBtn.style.display="inline-block";history.pushState({}, "", "/search");app.innerHTML=`<section class="wrap"><div class="title"><h1>نتائج البحث</h1><p>${list.length} نتيجة</p></div><div class="grid">${list.map(card).join("")}</div></section>`}
function book(n){picked=find(n);mt.textContent="طلب حجز: "+picked.t;type.innerHTML=picked.s==="snacks"?"<option>عربة مع تشغيل</option><option>ماكينة فقط</option>":picked.s==="events"?"<option>تجهيز حفلة</option>":"<option>نطاطية / زحليقة</option>";dur.innerHTML=picked.s==="snacks"?"<option>3 ساعات</option><option>4 ساعات</option>":"<option>يوم واحد</option><option>حسب الاتفاق</option>";modal.classList.add("show")}
function hide(){modal.classList.remove("show")}function send(){let m=`السلام عليكم، أريد حجز ${picked.t}%0Aالاسم: ${name.value}%0Aالجوال: ${phone.value}%0Aالتاريخ: ${date.value}%0Aالوقت: ${time.value}%0Aالنوع: ${type.value}%0Aالمدة: ${dur.value}%0Aالموقع: ${loc.value}%0Aملاحظات: ${notes.value}`;window.open("https://wa.me/97433317720?text="+m,"_blank")}function wa(){window.open("https://wa.me/97433317720?text=السلام عليكم، أريد الحجز من شركة الملكة","_blank")}function waItem(n){let x=find(n);window.open("https://wa.me/97433317720?text="+encodeURIComponent("السلام عليكم، أريد الاستفسار عن "+x.t+" رقم "+x.n),"_blank")}function openCart(){alert("السلة جاهزة للتطوير — حالياً استخدم زر احجزها أو واتساب")}function find(n){return items.find(x=>String(x.n)===String(n))}function sortByNum(){let list=items.filter(x=>x.s===routeFromLocation()).sort((a,b)=>a.n-b.n);grid.innerHTML=list.map(card).join("")}
</script><footer class="foot">الملكة للحفلات وتأجير النطاطيات داخل قطر - Instagram: @almalika_qtr</footer>
</body></html>

let page='home', activeType=null, cart=[];
const types=[...new Set(PRODUCTS.map(p=>p.type))];
function money(v){return v?Number(v).toLocaleString('ar-QA'):''}
function currentCustomer(){try{return JSON.parse(localStorage.getItem('customer')||'null')}catch(e){return null}}
function showProfile(){const c=currentCustomer();if(!c){profileCard.style.display='none';loginBtn.style.display='inline-block';return}profileCard.style.display='block';loginBtn.style.display='none';pName.value=c.name||'';pPhone.value=c.phone||'';pAddress.value=c.address||'';pLocation.value=c.location||''}
function openLogin(){loginModal.style.display='flex'} function closeLogin(){loginModal.style.display='none'}
async async function loginCustomer(){const phone=loginPhone.value.trim(),name=loginName.value.trim(),address=loginAddress.value.trim();if(!phone||!name){alert('أدخل الهاتف والاسم');return}const c={phone,name,address,location:'',updatedAt:new Date().toISOString()};localStorage.setItem('customer',JSON.stringify(c));try{await fb.setDoc(fb.doc(db,'customers',phone),{...c,updatedAt:fb.serverTimestamp()},{merge:true})}catch(e){console.error(e)}closeLogin();showProfile();alert('تم حفظ الزبون ✅')}
async async function saveProfile(){let c=currentCustomer();if(!c)return;c.name=pName.value;c.address=pAddress.value;c.location=pLocation.value;localStorage.setItem('customer',JSON.stringify(c));try{await fb.setDoc(fb.doc(db,'customers',c.phone),{...c,updatedAt:fb.serverTimestamp()},{merge:true})}catch(e){}alert('تم حفظ البيانات ✅')}
function getLocation(){navigator.geolocation?navigator.geolocation.getCurrentPosition(p=>{pLocation.value=`https://maps.google.com/?q=${p.coords.latitude},${p.coords.longitude}`;saveProfile()},()=>alert('اسمح بتحديد الموقع')):alert('المتصفح لا يدعم الموقع')} function openLocation(){pLocation.value?window.open(pLocation.value,'_blank'):alert('حدد الموقع أولاً')}
function catCard(t){const i=CAT_INFO[t]||{title:t,icon:'🏰',desc:''};const count=PRODUCTS.filter(p=>p.type===t).length;return `<div class="cat" onclick="showType('${t}')"><div class="catIcon">${i.icon}</div><div class="catTitle">${i.title}</div><div class="catDesc">${i.desc}</div><div class="tag" style="margin-top:10px">${count} بند</div></div>`}
function showHome(){page='home';activeType=null;backBtn.style.display='none';app.innerHTML=`<section class="container"><div class="hero"><span class="badge">👑 شركة الملكة للحفلات - قطر</span><h1>كتالوج النطاطيات والزحاليق</h1><p>اختر النوع، شوف كل التفاصيل، حدد تاريخ ووقت التركيب عند النطاطية، ثم أضف للسلة وأرسل الطلب واتساب.</p><div class="heroBtns"><button class="primary" onclick="showType('جافة')">ابدأ بالنطاطيات الجافة</button><button class="secondary" onclick="openCart()">افتح السلة</button><a class="secondary" href="https://wa.me/97433317720">واتساب مباشر</a></div></div></section><section class="container"><h2 class="sectionTitle">الأقسام حسب النوع</h2><div class="grid grid5">${types.map(catCard).join('')}</div></section>`}
function showType(t){page='type';activeType=t;backBtn.style.display='inline-block';renderProducts()}
function renderProducts(){const q=search.value.trim();let list=PRODUCTS.filter(p=>p.type===activeType);if(q) list=list.filter(p=>String(p.id).includes(q)||p.name.includes(q)||p.type.includes(q)||String(p.age||'').includes(q));const i=CAT_INFO[activeType]||{title:activeType,icon:'🏰',desc:''};app.innerHTML=`<section class="container"><div class="panel"><h1>${i.icon} ${i.title}</h1><p>${i.desc} — عدد البنود: ${list.length}</p></div><div class="chips">${types.map(t=>`<button class="chip ${t===activeType?'active':''}" onclick="showType('${t}')">${CAT_INFO[t]?.title||t}</button>`).join('')}</div><div class="grid grid3">${list.length?list.map(productCard).join(''):'<div class="empty">لا توجد نتائج</div>'}</div></section>`}
function productCard(p){return `<div class="product"><img src="${p.image}" onerror="this.src='https://via.placeholder.com/600x400?text=Almalika'"><div class="body"><span class="tag">رقم ${p.id} · ${p.type}</span><h3>${p.name}</h3><div class="details"><div class="info">سعر يوم: ${money(p.price1Day)} ر.ق</div><div class="info">سعر يومين: ${money(p.price2Days)} ر.ق</div><div class="info">المقاس: ${p.length||'-'} × ${p.width||'-'} × ${p.height||'-'}</div><div class="info">العمر: ${p.age||'-'}</div></div><div class="booking"><label>تاريخ التركيب</label><input type="date" id="date_${p.id}"><label>وقت التركيب المطلوب</label><input type="time" id="time_${p.id}"><label>مدة الإيجار</label><select id="duration_${p.id}"><option value="1">يوم واحد - ${money(p.price1Day)} ر.ق</option><option value="2">يومين - ${money(p.price2Days)} ر.ق</option></select><button class="add" onclick="addToCart(${p.id})">إضافة للسلة</button></div></div></div>`}
function renderCurrent(){if(page==='home')showHome();else renderProducts()} function goBack(){search.value='';showHome()}
function addToCart(id){const p=PRODUCTS.find(x=>x.id===id);const date=document.getElementById('date_'+id)?.value||'',time=document.getElementById('time_'+id)?.value||'',dur=document.getElementById('duration_'+id)?.value||'1';if(!date||!time){alert('حدد تاريخ ووقت التركيب أولاً');return}const price=dur==='2'?p.price2Days:p.price1Day;cart.push({...p,qty:1,bookingDate:date,setupTime:time,durationDays:dur,selectedPrice:price});updateCart();alert('تمت الإضافة للسلة ✅')}
function updateCart(){const count=cart.reduce((a,b)=>a+b.qty,0),total=cart.reduce((a,b)=>a+(Number(b.selectedPrice)||0)*b.qty,0);cartCount.textContent=count;topCount.textContent=count;cartTotal.textContent=total;modalTotal.textContent=total}
function openCart(){if(!currentCustomer()){openLogin();return}if(!currentCustomer().location) setTimeout(()=>{if(confirm('لم يتم تحديد موقع البيت. هل تريد تحديده الآن؟')) getLocation()},250);renderCart();cartModal.style.display='flex'} function closeCart(){cartModal.style.display='none'}
function renderCart(){const c=currentCustomer();cartCustomerInfo.innerHTML=`<div class="cartItem"><b>بيانات الزبون</b><br>👤 ${c.name}<br>📞 ${c.phone}<br>📍 ${c.address||''}<br>🗺️ ${c.location?`<a href="${c.location}" target="_blank">فتح الموقع</a>`:'لا يوجد موقع'}</div>`;cartItems.innerHTML=cart.length?cart.map((i,idx)=>`<div class="cartItem"><div class="row"><b>#${i.id} - ${i.name}</b><button class="remove" onclick="removeItem(${idx})">حذف</button></div>النوع: ${i.type}<br>التاريخ: ${i.bookingDate} · الوقت: ${i.setupTime}<br>المدة: ${i.durationDays} يوم · السعر: ${i.selectedPrice} ر.ق</div>`).join(''):'<div class="cartItem">السلة فارغة</div>';updateCart()}
function removeItem(i){cart.splice(i,1);renderCart()}
async async function submitOrder(){const c=currentCustomer();if(!cart.length){alert('السلة فارغة');return}const notes=document.getElementById('notes').value||'',total=cart.reduce((a,b)=>a+(Number(b.selectedPrice)||0)*b.qty,0);const order={category:'bouncy',customerName:c.name,phone:c.phone,address:c.address||'',location:c.location||'',items:cart.map(i=>({id:i.id,name:i.name,type:i.type,price:i.selectedPrice,bookingDate:i.bookingDate,setupTime:i.setupTime,durationDays:i.durationDays,length:i.length||'',width:i.width||'',height:i.height||'',age:i.age||'',image:i.image||''})),total,notes,status:'جديد',createdAt:fb.serverTimestamp()};try{
  const orderRef = await fb.addDoc(fb.collection(db,'orders'), order);
  await fb.addDoc(fb.collection(db,'customers', c.phone, 'orders'), {...order, orderId: orderRef.id});
  await fb.setDoc(fb.doc(db,'customers', c.phone), {
    lastOrderId: orderRef.id,
    lastOrderAt: fb.serverTimestamp(),
    lastOrderTotal: total,
    lastOrderStatus: 'جديد'
  }, {merge:true});
}catch(e){console.error(e);alert('تحقق من Firebase Rules')}let msg=`السلام عليكم، طلب حجز نطاطيات من موقع الملكة:%0A%0Aالزبون: ${c.name}%0Aالهاتف: ${c.phone}%0Aالعنوان: ${c.address||''}%0Aالموقع: ${c.location||''}%0A%0A`;cart.forEach((i,n)=>msg+=`${n+1}) رقم ${i.id} - ${i.name}%0Aالتاريخ: ${i.bookingDate}%0Aالوقت: ${i.setupTime}%0Aالمدة: ${i.durationDays} يوم%0Aالسعر: ${i.selectedPrice} ر.ق%0A%0A`);msg+=`الإجمالي: ${total} ر.ق%0Aملاحظات: ${notes}`;window.open(`https://wa.me/${whatsappNumber}?text=${msg}`,'_blank');cart=[];updateCart();closeCart();alert('تم حفظ الطلب وفتح واتساب ✅')}
async function openAdmin(){adminModal.style.display='flex';await renderAdmin()} function closeAdmin(){adminModal.style.display='none'} async function renderAdmin(){let orders=[];try{const snap=await fb.getDocs(fb.query(fb.collection(db,'orders'),fb.orderBy('createdAt','desc')));snap.forEach(d=>orders.push({id:d.id,...d.data()}))}catch(e){console.error(e)}const q=(adminSearch.value||'').trim();const f=orders.filter(o=>!q||(o.phone||'').includes(q)||(o.customerName||'').includes(q));ordersList.innerHTML=f.length?f.map(o=>`<div class="orderItem"><div class="row"><b>${o.id}</b><span>${o.status||'جديد'}</span></div>👤 ${o.customerName||''} | 📞 ${o.phone||''}<br>📍 ${o.address||''}<br><b>الطلبات:</b><br>${(o.items||[]).map(i=>`- #${i.id} ${i.name} · ${i.bookingDate||''} ${i.setupTime||''} · ${i.price||''} ر.ق`).join('<br>')}<br><b>الإجمالي: ${o.total||0} ر.ق</b><br>📝 ${o.notes||''}</div>`).join(''):'<div class="orderItem">لا توجد طلبات</div>'}

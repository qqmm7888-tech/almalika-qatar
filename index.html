<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>الملكة | تطبيق حجز الحفلات في قطر</title>
<meta name="description" content="الملكة لتأجير النطاطيات والزحاليق والسناك وتجهيز الحفلات في قطر">
<style>
:root{
  --qatar:#6f1738;
  --qatar2:#9e3159;
  --rose:#ff3b8f;
  --rose2:#ff77b8;
  --gold:#d8a629;
  --gold2:#fff1b8;
  --mint:#00c879;
  --blue:#1da7ff;
  --violet:#7b52ff;
  --ink:#22141d;
  --muted:#806877;
  --paper:#fff;
  --cream:#fff8ee;
  --soft:#fff1f7;
  --line:#f0d6e3;
  --shadow:0 24px 70px rgba(111,23,56,.13);
  --shadow2:0 12px 32px rgba(111,23,56,.12);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:"Tajawal","Cairo","Segoe UI",Arial,sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 8% 5%,rgba(255,119,184,.20),transparent 26%),
    radial-gradient(circle at 96% 10%,rgba(29,167,255,.14),transparent 26%),
    linear-gradient(135deg,#fffafc 0%,#fff0f7 45%,#fef8e8 100%);
  padding-bottom:98px;
}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer}
img{display:block}
a{text-decoration:none;color:inherit}
.container{width:min(100% - 28px,1560px);margin:auto}
.appbar{
  position:sticky;top:0;z-index:1000;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(240,214,227,.8);
  box-shadow:0 10px 30px rgba(111,23,56,.06);
}
.appbar-inner{
  width:min(100% - 28px,1560px);
  margin:auto;
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:14px;
  align-items:center;
  padding:10px 0;
}
.brand{
  display:flex;align-items:center;gap:11px;
  min-width:200px;
  cursor:pointer;
}
.brand-logo{
  width:50px;height:50px;border-radius:20px;
  display:grid;place-items:center;
  background:linear-gradient(145deg,#fff,var(--gold2),#fff);
  border:1px solid rgba(216,166,41,.42);
  box-shadow:0 16px 35px rgba(216,166,41,.18);
  font-size:25px;
}
.brand b{
  display:block;
  font-size:24px;
  color:var(--qatar);
  line-height:1;
}
.brand span{
  display:block;
  margin-top:4px;
  font-size:11px;
  color:#9b6d22;
  font-weight:1000;
}
.nav{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  flex-wrap:wrap;
}
.nav button,.top-action{
  border:0;
  border-radius:999px;
  background:#f5f4f6;
  color:#2b2228;
  font-weight:1000;
  padding:10px 15px;
  transition:.18s;
}
.nav button:hover,.top-action:hover{transform:translateY(-1px);background:#fff1f7}
.nav button.active{
  color:#fff;
  background:linear-gradient(135deg,var(--qatar),var(--rose));
  box-shadow:0 14px 28px rgba(255,59,143,.18);
}
.top-actions{display:flex;align-items:center;gap:8px;white-space:nowrap}
.cart-mini{background:#e60023!important;color:#fff!important;min-width:56px}
.search-dock{
  width:min(100% - 28px,1050px);
  margin:0 auto;
  display:grid;
  grid-template-columns:88px 1fr 150px;
  gap:9px;
  padding:0 0 11px;
}
.back-btn{
  display:none;
  border:0;border-radius:999px;
  background:#111;
  color:#fff4c6;
  font-weight:1000;
}
.global-search{
  height:42px;
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
  display:flex;align-items:center;gap:10px;
  padding:0 14px;
  box-shadow:0 12px 26px rgba(111,23,56,.06);
}
.global-search input{
  border:0;outline:0;background:transparent;width:100%;
  color:var(--qatar);font-weight:950;
}
.search-icon{font-size:19px}
.search-dock select{
  border:1px solid var(--line);
  border-radius:999px;
  background:#fff;
  color:var(--qatar);
  font-weight:1000;
  padding:0 12px;
}
.hero{
  position:relative;
  isolation:isolate;
  min-height:clamp(520px,44vw,760px);
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 28%,rgba(255,255,255,.86),rgba(255,255,255,.52) 35%,transparent 62%),
    linear-gradient(135deg,#fff7fb 0%,#ffeaf5 43%,#fff5dc 100%);
}
.hero::before{
  content:"";
  position:absolute;inset:0;z-index:-2;
  background:
    url("1.jpg") left 0 bottom 8%/27% auto no-repeat,
    url("34.jpg") left 28% bottom 0/25% auto no-repeat,
    url("120.jpg") right 30% top 9%/13% auto no-repeat,
    url("121.jpg") right 20% top 9%/13% auto no-repeat,
    url("124.jpg") right 10% top 9%/13% auto no-repeat,
    url("126.jpg") right 30% bottom 13%/13% auto no-repeat,
    url("128.jpg") right 20% bottom 10%/13% auto no-repeat,
    url("122.jpg") right 8% bottom 10%/13% auto no-repeat;
  opacity:.95;
}
.hero::after{
  content:"";
  position:absolute;inset:0;z-index:-1;
  background:
    radial-gradient(circle at 0 100%,rgba(255,255,255,.85) 0 10%,transparent 11%),
    radial-gradient(circle at 100% 96%,rgba(255,191,217,.72) 0 13%,transparent 14%),
    linear-gradient(115deg,transparent 0 44%,rgba(216,166,41,.16) 45%,rgba(255,255,255,.45) 49%,rgba(216,166,41,.14) 53%,transparent 54%);
  background-size:auto,auto,380px 380px;
}
.hero-grid{
  width:min(100% - 28px,1560px);
  margin:auto;
  min-height:inherit;
  display:grid;
  grid-template-columns:minmax(330px,480px) 1fr minmax(300px,430px);
  gap:28px;
  align-items:center;
}
.booking-card{
  background:rgba(255,255,255,.82);
  border:1px solid rgba(255,255,255,.9);
  border-radius:34px;
  padding:22px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}
.booking-card .label{
  display:inline-flex;gap:7px;align-items:center;
  border-radius:999px;
  padding:8px 12px;
  background:#fff8dd;
  color:#8f5d12;
  font-weight:1000;
  margin-bottom:12px;
}
.booking-card h3{
  margin:0 0 8px;
  color:var(--qatar);
  font-size:28px;
  line-height:1.2;
}
.booking-card p{margin:0 0 15px;color:var(--muted);font-weight:900;line-height:1.7}
.wizard{
  display:grid;
  gap:10px;
}
.wizard select,.wizard input{
  height:48px;
  border:1px solid var(--line);
  border-radius:18px;
  background:#fff;
  padding:0 14px;
  font-weight:900;
  color:var(--qatar);
  outline:0;
}
.hero-center{
  text-align:center;
  padding:35px 10px;
}
.badge{
  display:inline-flex;gap:8px;align-items:center;
  border-radius:999px;
  padding:9px 15px;
  background:rgba(255,255,255,.76);
  border:1px solid rgba(216,166,41,.45);
  color:#9a641d;
  font-weight:1000;
  box-shadow:0 15px 32px rgba(216,166,41,.14);
}
.hero h1{
  margin:14px 0 0;
  font-size:clamp(90px,8.8vw,170px);
  line-height:.85;
  color:#a16017;
  font-weight:1000;
  letter-spacing:-2px;
  text-shadow:0 3px 0 #fff,0 8px 0 rgba(255,238,178,.72),0 24px 50px rgba(111,23,56,.18);
}
.hero h2{
  margin:20px auto 0;
  max-width:850px;
  color:var(--qatar);
  font-size:clamp(30px,2.8vw,52px);
  line-height:1.26;
  font-weight:1000;
  text-shadow:0 2px 0 rgba(255,255,255,.9);
}
.hero .sub{
  margin:11px auto 0;
  color:#8c5b1c;
  font-weight:1000;
  font-size:clamp(17px,1.45vw,26px);
  line-height:1.6;
}
.hero-actions{
  display:flex;justify-content:center;gap:11px;flex-wrap:wrap;margin-top:23px;
}
.btn{
  border:0;border-radius:999px;padding:13px 23px;font-weight:1000;transition:.18s;
}
.btn:hover{transform:translateY(-2px)}
.btn-primary{background:linear-gradient(135deg,var(--qatar),var(--rose));color:#fff;box-shadow:0 14px 30px rgba(255,59,143,.22)}
.btn-dark{background:#111;color:#fff3b2}
.btn-light{background:#fff;color:var(--qatar);border:1px solid var(--line)}
.btn-mint{background:var(--mint);color:#fff}
.stat-card{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.stat{
  background:rgba(255,255,255,.82);
  border:1px solid rgba(255,255,255,.9);
  border-radius:26px;
  padding:16px;
  min-height:120px;
  box-shadow:var(--shadow2);
  backdrop-filter:blur(10px);
}
.stat i{font-style:normal;font-size:34px}
.stat b{display:block;margin-top:8px;font-size:27px;color:var(--qatar)}
.stat span{display:block;margin-top:5px;color:var(--muted);font-weight:900;font-size:13px}
.quick-cats{
  margin-top:-42px;
  position:relative;
  z-index:5;
}
.cat-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
}
.cat{
  background:rgba(255,255,255,.93);
  border:1px solid rgba(255,255,255,.9);
  border-radius:30px;
  padding:18px;
  box-shadow:var(--shadow);
  cursor:pointer;
  min-height:154px;
  transition:.18s;
  overflow:hidden;
  position:relative;
}
.cat:hover{transform:translateY(-5px)}
.cat::before{
  content:"";
  position:absolute;inset:auto -28px -40px auto;
  width:130px;height:130px;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,59,143,.18),rgba(29,167,255,.14),rgba(216,166,41,.20));
}
.cat .emoji{font-size:42px}
.cat h3{margin:10px 0 6px;color:var(--qatar);font-size:23px}
.cat p{margin:0;color:#7b6270;font-weight:900;line-height:1.55}
.home-tabs{
  display:flex;
  justify-content:center;
  margin:30px 0 14px;
}
.tabs{
  display:flex;gap:8px;
  background:rgba(255,255,255,.85);
  padding:7px;border:1px solid var(--line);
  border-radius:999px;
  box-shadow:var(--shadow2);
}
.tabs button{
  min-width:170px;
  border:0;border-radius:999px;
  padding:13px 26px;
  color:var(--qatar);
  background:transparent;
  font-weight:1000;
}
.tabs button.active{background:#111;color:#fff4b5}
.section-head{
  display:flex;align-items:end;justify-content:space-between;gap:15px;
  margin:30px 0 18px;
}
.section-head h2{margin:0;color:var(--qatar);font-size:clamp(30px,3.4vw,54px);line-height:1.2}
.section-head p{margin:7px 0 0;color:#806877;font-weight:900}
.products{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  margin-bottom:42px;
}
.product{
  background:rgba(255,255,255,.92);
  border:1px solid var(--line);
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 17px 38px rgba(111,23,56,.10);
  position:relative;
}
.num{
  position:absolute;left:12px;top:12px;z-index:3;
  color:#fff;background:linear-gradient(135deg,var(--qatar),var(--rose));
  padding:6px 10px;border-radius:999px;font-size:12px;font-weight:1000;
}
.pic{
  height:220px;
  display:grid;place-items:center;
  overflow:hidden;
  background:linear-gradient(135deg,#fff8e8,#fff1f7,#eaf8ff);
}
.pic img{width:100%;height:100%;object-fit:contain;transition:.25s}
.product:hover img{transform:scale(1.04)}
.product-body{padding:15px}
.product h3{margin:0;color:#2c1623;font-size:21px;line-height:1.25}
.desc{margin-top:7px;color:#735b68;font-weight:850;line-height:1.6;font-size:13px;min-height:42px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin:11px 0}
.tag{
  border:1px solid #efdcb7;background:#fff6e6;color:#835813;
  border-radius:999px;padding:5px 9px;font-size:12px;font-weight:1000;
}
.price-line{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:10px}
.price{
  min-width:76px;text-align:center;border-radius:16px;padding:8px 10px;
  background:#fff3d4;border:1px solid #ead18d;color:#111;font-weight:1000;
}
.price small{display:block;color:#9b6b1f;font-size:10px}
.card-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}
.card-actions .book{background:var(--rose);color:#fff}
.card-actions .wa{background:var(--mint);color:#fff}
.page-title{
  margin:24px auto;
  text-align:center;
  border:1px solid rgba(255,255,255,.95);
  border-radius:36px;
  padding:32px 22px;
  background:rgba(255,255,255,.78);
  box-shadow:var(--shadow);
}
.page-title h1{margin:0;color:var(--qatar);font-size:clamp(36px,4vw,64px)}
.page-title p{margin:10px 0 0;color:#806877;font-weight:900}
.filters{
  display:flex;gap:9px;overflow:auto;
  padding:4px 2px 13px;
  scrollbar-width:thin;
}
.chip{
  white-space:nowrap;border:1px solid var(--line);
  background:rgba(255,255,255,.9);
  border-radius:999px;
  padding:10px 16px;
  color:var(--qatar);
  font-weight:1000;
}
.chip.active{background:#fff1ce;border-color:#e9cc80}
.info-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  margin-bottom:42px;
}
.info{
  background:rgba(255,255,255,.86);
  border:1px solid var(--line);
  border-radius:28px;
  padding:20px;
  box-shadow:var(--shadow2);
}
.info h3{margin:0 0 10px;color:var(--qatar);font-size:24px}
.info ul{margin:0;padding:0 24px 0 0;line-height:2;font-weight:850;color:#66515e}
.footer{
  margin-top:45px;
  padding:40px 18px;
  text-align:center;
  color:#fff;
  background:linear-gradient(135deg,var(--qatar),var(--rose),var(--gold));
  font-weight:1000;
}
.footer-actions{margin-top:14px;display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.float-cart{
  position:fixed;left:50%;bottom:16px;transform:translateX(-50%);
  z-index:1200;
  min-width:340px;
  background:#050505;color:#fff;
  border-radius:999px;
  padding:15px 24px;
  text-align:center;
  font-weight:1000;
  box-shadow:0 18px 42px rgba(0,0,0,.26);
}
.modal{
  position:fixed;inset:0;display:none;place-items:center;
  z-index:2300;background:rgba(21,19,26,.62);
  padding:16px;
}
.modal.show{display:grid}
.modal-card{
  background:#fff;width:min(720px,100%);max-height:92vh;overflow:auto;
  border-radius:34px;
  box-shadow:0 34px 95px rgba(0,0,0,.28);
}
.modal-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 20px;
  border-bottom:1px solid var(--line);
}
.modal-head h3{margin:0;color:var(--qatar);font-size:27px}
.close{
  border:0;width:38px;height:38px;border-radius:50%;
  background:#f3eef1;font-size:22px;
}
.form{
  padding:20px;
  display:grid;grid-template-columns:1fr 1fr;
  gap:12px;
}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-weight:1000;color:#6e405a}
.field input,.field select,.field textarea{
  border:1px solid var(--line);
  border-radius:17px;
  padding:12px 13px;
  outline:0;
  font-weight:850;
}
.field textarea{min-height:95px;resize:vertical}
.form-actions{grid-column:1/-1;display:flex;gap:10px;flex-wrap:wrap}
.toast{
  position:fixed;right:16px;top:94px;z-index:3200;
  background:#111;color:#fff;border-radius:16px;
  padding:12px 16px;font-weight:1000;display:none;
}
.toast.show{display:block}
.mobile-nav{display:none}
@media(max-width:1280px){
  .hero-grid{grid-template-columns:1fr;gap:16px;padding:26px 0}
  .booking-card,.stat-card{display:none}
  .hero-center{width:min(980px,100%);margin:auto}
  .products{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:980px){
  .appbar-inner{grid-template-columns:1fr auto}
  .nav{grid-column:1/-1;justify-content:flex-start;overflow:auto;flex-wrap:nowrap;padding-bottom:2px}
  .nav button{white-space:nowrap}
  .cat-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:700px){
  body{padding-bottom:92px}
  .brand span,.top-actions .desktop-only{display:none}
  .search-dock{grid-template-columns:1fr;width:calc(100% - 20px)}
  .back-btn{height:42px}
  .hero{min-height:420px}
  .hero::before{
    background:
      url("1.jpg") left -12% bottom 18%/44% auto no-repeat,
      url("34.jpg") left 24% bottom 7%/37% auto no-repeat,
      url("120.jpg") right 22% top 9%/22% auto no-repeat,
      url("126.jpg") right 18% bottom 9%/24% auto no-repeat;
  }
  .hero h1{font-size:62px}
  .hero h2{font-size:22px;line-height:1.45}
  .hero .sub{font-size:14px}
  .hero-actions .btn{width:100%}
  .cat-grid,.products,.info-grid{grid-template-columns:1fr}
  .section-head{display:block;text-align:center}
  .pic{height:235px}
  .form{grid-template-columns:1fr}
  .float-cart{width:calc(100% - 32px);min-width:auto}
  .mobile-nav{
    display:grid;grid-template-columns:repeat(4,1fr);
    position:fixed;bottom:0;left:0;right:0;z-index:1300;
    background:#fff;border-top:1px solid var(--line);
    padding:6px 6px 7px;
    box-shadow:0 -10px 28px rgba(111,23,56,.08);
  }
  .mobile-nav button{border:0;background:transparent;color:var(--qatar);font-weight:1000;font-size:12px}
  .mobile-nav b{display:block;font-size:20px}
  .float-cart{bottom:64px}
}
</style>
</head>
<body>
<header class="appbar">
  <div class="appbar-inner">
    <div class="brand" onclick="goPage('home')">
      <div class="brand-logo">👑</div>
      <div><b>الملكة</b><span>تطبيق الحفلات المصغر</span></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="top-actions">
      <button class="top-action cart-mini" onclick="openCart()">🛒 <span id="cartCount">0</span></button>
      <button class="top-action" onclick="openWhats()">واتساب</button>
      <button class="top-action desktop-only" onclick="toast('لوحة الإدارة جاهزة للتطوير لاحقاً')">الإدارة</button>
    </div>
  </div>
  <div class="search-dock">
    <button id="backBtn" class="back-btn" onclick="goBack()">رجوع</button>
    <div class="global-search"><span class="search-icon" onclick="runSearch()">🔎</span><input id="searchInput" placeholder="ابحث برقم اللعبة أو الاسم أو القسم..."></div>
    <select id="sectionJump" onchange="jumpTo(this.value)">
      <option value="home">الكل</option>
      <option value="bouncies">النطاطيات</option>
      <option value="offers">العروض</option>
      <option value="snacks">السناك والعربات</option>
      <option value="events">تجهيز الحفلات</option>
    </select>
  </div>
</header>

<main id="app"></main>

<footer class="footer">
  <div>الملكة للحفلات وتأجير النطاطيات — خدمة داخل قطر</div>
  <div class="footer-actions">
    <button class="btn btn-light" onclick="location.href='tel:33317720'">اتصال 33317720</button>
    <button class="btn btn-light" onclick="location.href='tel:33317721'">اتصال 33317721</button>
    <button class="btn btn-dark" onclick="openWhats('33317720')">واتساب 33317720</button>
    <button class="btn btn-dark" onclick="openWhats('33317705')">واتساب 33317705</button>
  </div>
  <div style="margin-top:14px">Instagram: @almalika_qtr</div>
</footer>

<div class="mobile-nav">
  <button onclick="goPage('home')"><b>🏠</b>الرئيسية</button>
  <button onclick="goPage('bouncies')"><b>🏰</b>ألعاب</button>
  <button onclick="goPage('snacks')"><b>🍿</b>سناك</button>
  <button onclick="openCart()"><b>🛒</b>السلة</button>
</div>

<div class="float-cart" onclick="openCart()">🛒 سلتي | <span id="cartTotal">0</span> ر.ق</div>

<div class="modal" id="bookingModal">
  <div class="modal-card">
    <div class="modal-head">
      <h3 id="bookingTitle">طلب حجز</h3>
      <button class="close" onclick="closeModal('bookingModal')">×</button>
    </div>
    <div class="form">

function init(){
  document.getElementById("nav").innerHTML=navItems.map(([id,name])=>`<button id="nav-${id}" onclick="goPage('${id}')">${name}</button>`).join("");
  document.getElementById("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter")runSearch()});
  if(!location.hash) history.replaceState({page:"home",filter:"الكل"},"","#home/الكل");
  renderFromHash();
  window.addEventListener("popstate",renderFromHash);
}
function parseHash(){
  const raw=(location.hash||"#home/الكل").replace(/^#/,"");
  const [page,filter]=raw.split("/");
  return {page:page||"home",filter:decodeURIComponent(filter||"الكل")};
}
function goPage(page,filter="الكل"){
  history.pushState({page,filter},"",`#${page}/${encodeURIComponent(filter)}`);
  renderPage(page,filter);
}
function goBack(){
  if(history.length>1) history.back(); else goPage("home");
}
function renderFromHash(){
  const r=parseHash();
  renderPage(r.page,r.filter);
}
function setActive(page){
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  const btn=document.getElementById("nav-"+page);
  if(btn) btn.classList.add("active");
  document.getElementById("backBtn").style.display=page==="home"?"none":"block";
  document.getElementById("sectionJump").value=["home","search"].includes(page)?"home":page;
}
function jumpTo(v){goPage(v)}

  window.open(`https://wa.me/97433317720?text=${msg}`,"_blank");
}
function addCurrentToCart(){
  if(!currentProduct) return;
  cart.push(currentProduct);
  updateCart();
  closeModal("bookingModal");
  toast("تمت الإضافة للسلة");
}
function whatsProduct(num){
  const p=findByNumber(num);
  window.open(`https://wa.me/97433317720?text=${encodeURIComponent("السلام عليكم، أريد الاستفسار عن "+p.title+" رقم "+p.number)}`,"_blank");
}
function openWhats(phone="33317720"){
  window.open(`https://wa.me/974${phone}?text=${encodeURIComponent("السلام عليكم، أريد الحجز من شركة الملكة")}`,"_blank");
}
function openCart(){
  const body=document.getElementById("cartBody");
  if(!cart.length) body.innerHTML="<p style='font-weight:1000'>السلة فارغة حالياً.</p>";
  else body.innerHTML=cart.map((p,i)=>`<div class="info" style="margin-bottom:10px"><b>${p.title}</b><br>${p.price} ر.ق <button class="btn btn-light" onclick="removeCart(${i})">حذف</button></div>`).join("")+`<button class="btn btn-primary" onclick="sendCart()">إرسال السلة واتساب</button>`;
  document.getElementById("cartModal").classList.add("show");
}
function removeCart(i){cart.splice(i,1);updateCart();openCart()}
function sendCart(){
  const msg=cart.map(p=>`- ${p.title} رقم ${p.number} (${p.price} ر.ق)`).join("%0A");
  window.open(`https://wa.me/97433317720?text=السلام عليكم، أريد حجز التالي:%0A${msg}`,"_blank");
}
function updateCart(){
  document.getElementById("cartTotal").textContent=cart.reduce((s,p)=>s+(+p.price||0),0);
  document.getElementById("cartCount").textContent=cart.length;
}
function findByNumber(n){return products.find(p=>String(p.number)===String(n))}
function v(id){return encodeURIComponent(document.getElementById(id).value||"")}
function toast(txt){
  const t=document.getElementById("toast");
  t.textContent=txt;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
init();
</script>
